name: Deno Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Define the list of binaries we're building
# This makes it easy to add more binaries in the future
env:
  BINARIES: "toolshed bg-charm-service cf"

jobs:
  # ---------------------------------------------------------------------------
  # Tier 0 – These jobs all start immediately with no dependencies
  # ---------------------------------------------------------------------------
  check:
    name: "Check"
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        run: deno install --frozen=true

      - name: 🔎 Check codebase formatting
        run: deno fmt --check

      - name: 🧹 Lint codebase
        run: deno lint

      - name: 🔎 Type check codebase
        run: deno task check

      - name: 🧭 Check cf-review skill facts
        run: deno task check-skill-facts

  cfcheck:
    name: "CFC Pattern Check (${{ matrix.shard }}/${{ matrix.total }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        total: [4]
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        run: deno install --frozen=true

      - name: 🔎 Check Common Fabric patterns
        env:
          CFCHECK_SHARD: "${{ matrix.shard }}/${{ matrix.total }}"
        run: deno task cfcheck

  test:
    name: "Test"
    runs-on:
      group: labs
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        run: deno install --frozen=true

      - name: 📦 Install Linux FUSE test dependencies
        uses: ./.github/actions/apt-install
        with:
          packages: pkg-config gcc libfuse3-dev fuse3
          cache-key: cfc-pattern-check

      - name: 📥 Download Deno dependency binaries
        run: deno task initialize-db

      # For deno-web-test browser tests
      # https://github.com/lino-levan/astral/blob/f5ef833b2c5bde3783564a6b925073d5d46bb4b8/README.md#no-usable-sandbox-with-user-namespace-cloning-enabled
      - name: 🛡️ Disable AppArmor for browser tests
        run: echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns

      - name: 🧪 Run parallel workspace tests
        run: deno task test
        env:
          DENO_COVERAGE_DIR: coverage/raw/workspace
          TEST_DISABLED_PACKAGES: runner

      - name: 🧾 Write coverage report
        if: always()
        run: deno run --allow-read --allow-write --allow-run tasks/write-coverage-lcov.ts coverage/raw/workspace coverage/lcov/workspace.lcov

      - name: 📤 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profile-workspace
          path: coverage/lcov/workspace.lcov
          retention-days: 90
          if-no-files-found: error

  runner-test:
    name: "Runner Tests (${{ matrix.shard }}/${{ matrix.total }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        total: [4]
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        run: deno install --frozen=true

      - name: 📥 Download Deno dependency binaries
        run: deno task initialize-db

      - name: 🧪 Run runner tests
        working-directory: packages/runner
        env:
          DENO_COVERAGE_DIR: ../../coverage/raw/runner-${{ matrix.shard }}
        run: |
          TEST_FILES=$(deno run --allow-read ../../tasks/select-runner-test-files.ts ${{ matrix.shard }}/${{ matrix.total }})
          if [ -z "$TEST_FILES" ]; then
            echo "::error::No runner test files selected for shard ${{ matrix.shard }}/${{ matrix.total }}"
            exit 1
          fi
          printf 'Runner test shard ${{ matrix.shard }}/${{ matrix.total }} files:\n'
          printf '  %s\n' $TEST_FILES
          ENV=test deno test \
            --allow-ffi \
            --allow-env \
            --allow-read \
            --allow-write=/tmp,/var/folders \
            --allow-run=git \
            $TEST_FILES

      - name: 🧾 Write coverage report
        if: always()
        run: deno run --allow-read --allow-write --allow-run tasks/write-coverage-lcov.ts coverage/raw/runner-${{ matrix.shard }} coverage/lcov/runner-${{ matrix.shard }}.lcov

      - name: 📤 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profile-runner-${{ matrix.shard }}
          path: coverage/lcov/runner-${{ matrix.shard }}.lcov
          retention-days: 90
          if-no-files-found: error

  build-binaries:
    name: "Build Binaries"
    runs-on:
      group: labs
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        run: deno install --frozen=true

      - name: 🏗️ Build application binaries
        run: deno task build-binaries
        env:
          COMMIT_SHA: ${{ github.sha }}

      # Upload binaries as artifacts for the integration tests
      - name: 📤 Upload binaries for integration tests
        uses: actions/upload-artifact@v4
        with:
          name: common-binaries
          path: |
            ./dist/toolshed
            ./dist/bg-charm-service
            ./dist/cf

  generated-patterns-integration-test:
    name: "Generated Patterns Integration Tests (${{ matrix.shard }}/${{ matrix.total }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        total: [4]
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        run: deno install --frozen=true

      - name: 📥 Download Deno dependency binaries
        run: deno task initialize-db

      - name: 🧪 Run generated patterns integration tests
        working-directory: packages/generated-patterns
        env:
          DENO_COVERAGE_DIR: ../../coverage/raw/generated-patterns-${{ matrix.shard }}
        run: |
          TEST_FILES=$(deno run --allow-read ../../tasks/select-generated-pattern-files.ts ${{ matrix.shard }}/${{ matrix.total }})
          if [ -z "$TEST_FILES" ]; then
            echo "::error::No generated pattern files selected for shard ${{ matrix.shard }}/${{ matrix.total }}"
            exit 1
          fi
          printf 'Generated patterns shard ${{ matrix.shard }}/${{ matrix.total }} files:\n'
          printf '  %s\n' $TEST_FILES
          mkdir -p ../../test-results
          LOG_LEVEL=warn deno test --trace-leaks -A --parallel \
            --junit-path=../../test-results/generated-patterns-${{ matrix.shard }}.xml \
            $TEST_FILES

      - name: 🧾 Write coverage report
        if: always()
        run: deno run --allow-read --allow-write --allow-run tasks/write-coverage-lcov.ts coverage/raw/generated-patterns-${{ matrix.shard }} coverage/lcov/generated-patterns-${{ matrix.shard }}.lcov

      - name: 📤 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profile-generated-patterns-${{ matrix.shard }}
          path: coverage/lcov/generated-patterns-${{ matrix.shard }}.lcov
          retention-days: 90
          if-no-files-found: error

      - name: 📤 Upload test timing data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-timing-generated-patterns-${{ matrix.shard }}
          path: test-results/
          retention-days: 90
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Tier 1 – Need built binaries
  # ---------------------------------------------------------------------------

  package-integration-test:
    name: "Package Integration Tests (${{ matrix.suite_name }})"
    runs-on: ubuntu-latest
    needs: ["build-binaries"]
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite_name: runner
            package_dir: packages/runner
            junit_name: runner
            step_name: runner integration tests
            headless: false
          - suite_name: runtime-client
            package_dir: packages/runtime-client
            junit_name: runtime-client
            step_name: runtime-client integration tests
            headless: false
          - suite_name: shell
            package_dir: packages/shell
            junit_name: shell
            step_name: shell integration tests
            headless: true
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 📥 Download built binaries
        uses: actions/download-artifact@v4

      - name: 🚀 Start Toolshed server for testing
        env:
          TOOLSHED_PORT: 8000
        run: |
          chmod +x ./common-binaries/toolshed
          CFTS_AI_GATEWAY_URL="" \
          CFTS_AI_LLM_ANTHROPIC_API_KEY=fake \
          ./common-binaries/toolshed --port="$TOOLSHED_PORT" &

      # For Astral
      # https://github.com/lino-levan/astral/blob/f5ef833b2c5bde3783564a6b925073d5d46bb4b8/README.md#no-usable-sandbox-with-user-namespace-cloning-enabled
      - name: 🛡️ Disable AppArmor for browser tests
        run: echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns

      - name: 🧪 Run ${{ matrix.step_name }}
        working-directory: ${{ matrix.package_dir }}
        env:
          DENO_COVERAGE_DIR: ../../coverage/raw/package-${{ matrix.suite_name }}
          HEADLESS_ENABLED: ${{ matrix.headless }}
          JUNIT_NAME: ${{ matrix.junit_name }}
          TOOLSHED_PORT: 8000
        run: |
          mkdir -p ../../test-results
          if [ "$HEADLESS_ENABLED" = "true" ]; then
            export HEADLESS=1
          fi
          API_URL="http://localhost:${TOOLSHED_PORT}/" \
          INTEGRATION_TEST_FLAGS="--junit-path=../../test-results/${JUNIT_NAME}.xml" \
          deno task integration

      - name: 🧾 Write coverage report
        if: always()
        run: deno run --allow-read --allow-write --allow-run tasks/write-coverage-lcov.ts coverage/raw/package-${{ matrix.suite_name }} coverage/lcov/package-${{ matrix.suite_name }}.lcov

      - name: 📤 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profile-package-${{ matrix.suite_name }}
          path: coverage/lcov/package-${{ matrix.suite_name }}.lcov
          retention-days: 90
          if-no-files-found: error

      - name: 📤 Upload test timing data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-timing-package-integration-${{ matrix.suite_name }}
          path: test-results/${{ matrix.junit_name }}.xml
          retention-days: 90
          if-no-files-found: ignore

  cli-integration-test:
    name: "CLI Integration Tests (${{ matrix.suite_name }})"
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout_minutes }}
    needs: ["build-binaries"]
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite_name: core-piece-values
            script: integration.sh
            section: piece-values
            toolshed_port: 8000
            install_fuse_deps: false
            timeout_minutes: 10
          - suite_name: core-piece-links
            script: integration.sh
            section: piece-links
            toolshed_port: 8001
            install_fuse_deps: false
            timeout_minutes: 10
          - suite_name: core-piece-call
            script: integration.sh
            section: piece-call
            toolshed_port: 8002
            install_fuse_deps: false
            timeout_minutes: 10
          - suite_name: fuse
            script: fuse-exec.sh
            section: ""
            toolshed_port: 8003
            install_fuse_deps: true
            timeout_minutes: 15
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 📥 Download built binaries
        uses: actions/download-artifact@v4

      - name: 🚀 Start Toolshed server for testing
        env:
          TOOLSHED_PORT: ${{ matrix.toolshed_port }}
          TOOLSHED_URL: http://localhost:${{ matrix.toolshed_port }}
        run: |
          chmod +x ./common-binaries/cf
          chmod +x ./common-binaries/toolshed
          # Set tools to path
          # Integration script needs `cf`
          echo "${{ github.workspace }}/common-binaries" >> $GITHUB_PATH
          CFTS_AI_GATEWAY_URL="" MEMORY_URL="$TOOLSHED_URL" API_URL="$TOOLSHED_URL" ./common-binaries/toolshed --port="$TOOLSHED_PORT" &

      - name: ⏳ Wait for Toolshed to be ready
        uses: ./.github/actions/wait-for-toolshed
        with:
          url: http://localhost:${{ matrix.toolshed_port }}

      - name: 📦 Install CLI integration dependencies
        uses: ./.github/actions/apt-install
        with:
          packages: ${{ matrix.install_fuse_deps && 'jq fuse3 libfuse3-dev' || 'jq' }}
          cache-key: cli-integration

      - name: 🔧 Enable FUSE device access
        if: ${{ matrix.suite_name == 'fuse' }}
        run: sudo chmod 666 /dev/fuse

      - name: 🧪 Run CLI integration suite
        if: ${{ startsWith(matrix.suite_name, 'core-') }}
        working-directory: packages/cli
        env:
          TOOLSHED_PORT: ${{ matrix.toolshed_port }}
          CF_CLI_INTEGRATION_SECTION: ${{ matrix.section }}
          CF_CLI_INTEGRATION_TIMINGS: "1"
          CF_CLI_INTEGRATION_TIMINGS_FILE: "../../test-results/cli-${{ matrix.suite_name }}-cf-timings.log"
        run: |
          mkdir -p ../../test-results
          : > "$CF_CLI_INTEGRATION_TIMINGS_FILE"
          API_URL="http://localhost:${TOOLSHED_PORT}" ./integration/${{ matrix.script }}

      - name: 🧪 Run CLI FUSE integration suite
        if: ${{ matrix.suite_name == 'fuse' }}
        working-directory: packages/cli
        env:
          TOOLSHED_PORT: ${{ matrix.toolshed_port }}
          FUSE_DEEP_ENTITY_PROBE: "0"
        run: |
          set +e
          API_URL="http://localhost:${TOOLSHED_PORT}" timeout 480 ./integration/${{ matrix.script }}
          rc=$?
          set -e
          if [ "$rc" -eq 124 ]; then
            echo "::error::FUSE integration timed out after 480 seconds"
          fi
          exit "$rc"

      - name: 📋 FUSE daemon log (on failure)
        if: ${{ failure() && matrix.suite_name == 'fuse' }}
        # `cf fuse mount --background` writes its log to /tmp/cf-fuse-<mountpoint>.log
        # (see packages/cli/commands/fuse.ts), not ~/.cf/fuse — the old path always
        # printed "No daemon log found", hiding the real daemon error. The mountpoint
        # is an mktemp dir, so glob all fuse daemon logs.
        run: |
          shopt -s nullglob
          logs=(/tmp/cf-fuse-*.log)
          if [ ${#logs[@]} -eq 0 ]; then
            echo "No FUSE daemon log found at /tmp/cf-fuse-*.log"
          else
            for f in "${logs[@]}"; do
              echo "===== ${f} ====="
              cat "${f}"
            done
          fi

      - name: 📤 Upload CLI integration timing data
        if: ${{ always() && startsWith(matrix.suite_name, 'core-') }}
        uses: actions/upload-artifact@v4
        with:
          name: test-timing-cli-${{ matrix.suite_name }}
          path: test-results/cli-${{ matrix.suite_name }}-cf-timings.log
          retention-days: 90
          if-no-files-found: ignore

  pattern-integration-test:
    name: "Pattern Integration Tests (${{ matrix.shard }}/${{ matrix.total }})"
    runs-on: ubuntu-latest
    needs: ["build-binaries"]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        total: [4]
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 📥 Download built binaries
        uses: actions/download-artifact@v4

      - name: 🚀 Start Toolshed server for testing
        run: |
          chmod +x ./common-binaries/toolshed
          CFTS_AI_GATEWAY_URL="" \
          CFTS_AI_LLM_ANTHROPIC_API_KEY=fake \
          ./common-binaries/toolshed &

      - name: ⏳ Wait for Toolshed to be ready
        uses: ./.github/actions/wait-for-toolshed
        with:
          url: http://localhost:8000

      # For Astral
      # https://github.com/lino-levan/astral/blob/f5ef833b2c5bde3783564a6b925073d5d46bb4b8/README.md#no-usable-sandbox-with-user-namespace-cloning-enabled
      - name: 🛡️ Disable AppArmor for browser tests
        run: echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns

      - name: 🧩 Run end-to-end patterns integration tests
        working-directory: packages/patterns
        run: |
          mapfile -t TEST_FILES < <(deno run --allow-read ../../tasks/select-pattern-integration-files.ts ${{ matrix.shard }}/${{ matrix.total }})
          printf 'Pattern integration shard ${{ matrix.shard }}/${{ matrix.total }} files:\n'
          printf '  %s\n' "${TEST_FILES[@]}"
          mkdir -p ../../test-results
          HEADLESS=1 \
          API_URL=http://localhost:8000/ \
          DENO_COVERAGE_DIR=../../coverage/raw/pattern-integration-${{ matrix.shard }} \
          deno test --v8-flags=--max-old-space-size=4096 --trace-leaks -A \
            --junit-path=../../test-results/patterns-${{ matrix.shard }}.xml \
            "${TEST_FILES[@]}"

      - name: 🧾 Write coverage report
        if: always()
        run: deno run --allow-read --allow-write --allow-run tasks/write-coverage-lcov.ts coverage/raw/pattern-integration-${{ matrix.shard }} coverage/lcov/pattern-integration-${{ matrix.shard }}.lcov

      - name: 📤 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profile-pattern-integration-${{ matrix.shard }}
          path: coverage/lcov/pattern-integration-${{ matrix.shard }}.lcov
          retention-days: 90
          if-no-files-found: error

      - name: 📤 Upload test timing data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-timing-pattern-integration-${{ matrix.shard }}
          path: test-results/
          retention-days: 90
          if-no-files-found: ignore

  pattern-reload-integration-test:
    name: "Pattern Reload Integration Tests"
    runs-on: ubuntu-latest
    needs: ["build-binaries"]
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      # For Astral
      # https://github.com/lino-levan/astral/blob/f5ef833b2c5bde3783564a6b925073d5d46bb4b8/README.md#no-usable-sandbox-with-user-namespace-cloning-enabled
      - name: 🛡️ Disable AppArmor for browser tests
        run: echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns

      - name: 🧩 Run pattern reload integration tests
        run: |
          mkdir -p test-results
          HEADLESS=1 \
          EXPERIMENTAL_PERSISTENT_SCHEDULER_STATE=true \
          CF_EXPECT_PERSISTENT_SCHEDULER_STATE=1 \
          DENO_COVERAGE_DIR=coverage/raw/pattern-reload \
          deno task integration --junit-dir=test-results patterns-reload

      - name: 🧾 Write coverage report
        if: always()
        run: deno run --allow-read --allow-write --allow-run tasks/write-coverage-lcov.ts coverage/raw/pattern-reload coverage/lcov/pattern-reload.lcov

      - name: 📤 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profile-pattern-reload
          path: coverage/lcov/pattern-reload.lcov
          retention-days: 90
          if-no-files-found: error

      - name: 📤 Upload test timing data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-timing-pattern-reload-integration
          path: test-results/
          retention-days: 90
          if-no-files-found: ignore

  pattern-unit-test:
    name: "Pattern Unit Tests (${{ matrix.chunk }}/${{ matrix.total }})"
    runs-on: ubuntu-latest
    needs: ["build-binaries"]
    strategy:
      matrix:
        chunk: [1, 2, 3, 4, 5]
        total: [5]
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        run: deno install --frozen=true

      - name: 📥 Download Deno dependency binaries
        run: deno task initialize-db

      - name: 📥 Download built binaries
        uses: actions/download-artifact@v4

      - name: 🧪 Run pattern unit tests
        run: |
          chmod +x ./common-binaries/cf
          mkdir -p test-results
          DENO_COVERAGE_DIR=coverage/raw/pattern-unit-${{ matrix.chunk }} CF_BINARY=./common-binaries/cf deno task integration --junit-dir=test-results pattern-tests ${{ matrix.chunk }}/${{ matrix.total }}

      - name: 🧾 Write coverage report
        if: always()
        run: deno run --allow-read --allow-write --allow-run tasks/write-coverage-lcov.ts coverage/raw/pattern-unit-${{ matrix.chunk }} coverage/lcov/pattern-unit-${{ matrix.chunk }}.lcov

      - name: 📤 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profile-pattern-unit-${{ matrix.chunk }}
          path: coverage/lcov/pattern-unit-${{ matrix.chunk }}.lcov
          retention-days: 90
          if-no-files-found: error

      - name: 📤 Upload test timing data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-timing-pattern-unit-${{ matrix.chunk }}
          path: test-results/
          retention-days: 90
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Tier 2 – Post-test gates and deployments
  # ---------------------------------------------------------------------------

  perf-check:
    name: "Performance Check"
    if: (github.event_name == 'pull_request') || (github.ref_name == 'main')
    runs-on: ubuntu-latest
    needs:
      - check
      - test
      - build-binaries
      - package-integration-test
      - cli-integration-test
      - pattern-integration-test
      - pattern-reload-integration-test
      - pattern-unit-test
      - generated-patterns-integration-test
      - runner-test
    permissions:
      contents: read
      actions: read
      # Read-only: fork PRs get a read-only token here regardless, so the gate
      # only writes the comment to an artifact. The coverage-comment workflow
      # posts it from the base-repo context with a write token.
      pull-requests: read
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup
        with:
          cache: false

      - name: 📊 Run performance check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: deno run --allow-net --allow-env --allow-read --allow-run --allow-write tasks/perf-check.ts

      - name: 📤 Upload coverage regression comment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-comment
          path: coverage-comment.json
          retention-days: 7
          if-no-files-found: ignore

      - name: 📤 Upload performance metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-metrics
          path: perf-metrics.json
          retention-days: 90
          if-no-files-found: ignore

      - name: 📤 Upload performance metrics backfill
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-metrics-backfill
          path: perf-metrics-backfill.json
          retention-days: 90
          if-no-files-found: ignore

  attest-binaries:
    name: "Attest and Upload Binaries"
    if: github.ref == 'refs/heads/main'
    runs-on:
      group: labs
    needs:
      [
        "test",
        "check",
        "runner-test",
        "pattern-integration-test",
        "pattern-reload-integration-test",
        "pattern-unit-test",
        "package-integration-test",
        "cli-integration-test",
      ]
    environment: ci
    permissions:
      id-token: write
      contents: read
      actions: read
      attestations: write
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download built binaries
        uses: actions/download-artifact@v4

      - name: 🔐 Process & sign binaries
        run: |
          mkdir -p release
          mkdir -p signed

          mv ./common-binaries ./dist

          # Process toolshed binary
          echo "Processing binary: toolshed"
          sha256sum ./dist/toolshed > ./dist/toolshed.hash.txt
          TOOLSHED_HASH=$(cat ./dist/toolshed.hash.txt | awk '{print $1}')
          echo "toolshed hash: $TOOLSHED_HASH"
          echo "toolshed_hash=$TOOLSHED_HASH" >> $GITHUB_OUTPUT

          # Sign the toolshed binary
          openssl dgst -sha256 -sign <(echo "${{ secrets.ARTIFACT_SIGNING_KEY }}") -out ./dist/toolshed.sig ./dist/toolshed

          # Copy to signed directory
          cp ./dist/toolshed ./signed/
          cp ./dist/toolshed.sig ./signed/

          # Process bg-charm-service binary
          echo "Processing binary: bg-charm-service"
          sha256sum ./dist/bg-charm-service > ./dist/bg-charm-service.hash.txt
          BG_CHARM_SERVICE_HASH=$(cat ./dist/bg-charm-service.hash.txt | awk '{print $1}')
          echo "bg-charm-service hash: $BG_CHARM_SERVICE_HASH"
          echo "bg_charm_service_hash=$BG_CHARM_SERVICE_HASH" >> $GITHUB_OUTPUT

          # Sign the bg-charm-service binary
          openssl dgst -sha256 -sign <(echo "${{ secrets.ARTIFACT_SIGNING_KEY }}") -out ./dist/bg-charm-service.sig ./dist/bg-charm-service

          # Copy to signed directory
          cp ./dist/bg-charm-service ./signed/
          cp ./dist/bg-charm-service.sig ./signed/

          # Process cf binary
          echo "Processing binary: cf"
          sha256sum ./dist/cf > ./dist/cf.hash.txt
          CF_HASH=$(cat ./dist/cf.hash.txt | awk '{print $1}')
          echo "cf hash: $CF_HASH"
          echo "cf_hash=$CF_HASH" >> $GITHUB_OUTPUT

          # Sign the cf binary
          openssl dgst -sha256 -sign <(echo "${{ secrets.ARTIFACT_SIGNING_KEY }}") -out ./dist/cf.sig ./dist/cf

          # Copy to signed directory
          cp ./dist/cf ./signed/
          cp ./dist/cf.sig ./signed/

          # Create a single tarball with all binaries and signatures
          tar -czf release/labs-${{ github.sha }}.tar.gz -C signed .

          # Generate hash for the tarball
          sha256sum release/labs-${{ github.sha }}.tar.gz > release/labs-${{ github.sha }}.hash.txt
          TARBALL_HASH=$(cat release/labs-${{ github.sha }}.hash.txt | awk '{print $1}')
          echo "Tarball hash: $TARBALL_HASH"
          echo "tarball_hash=$TARBALL_HASH" >> $GITHUB_OUTPUT
        id: binary_processing

      - name: 📝 Generate attestation for toolshed binary
        id: attest_toolshed
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ./dist/toolshed
          subject-digest: sha256:${{ steps.binary_processing.outputs.toolshed_hash }}

      - name: 📝 Generate attestation for bg-charm-service binary
        id: attest_bg_charm_service
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ./dist/bg-charm-service
          subject-digest: sha256:${{ steps.binary_processing.outputs.bg_charm_service_hash }}

      - name: 📝 Generate attestation for cf binary
        id: attest_cf
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ./dist/cf
          subject-digest: sha256:${{ steps.binary_processing.outputs.cf_hash }}

      - name: 📝 Generate attestation for tarball
        id: attest_tarball
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: https://storage.cloud.google.com/commontools-build-artifacts/workspace-artifacts/labs-${{ github.sha }}.tar.gz
          subject-digest: sha256:${{ steps.binary_processing.outputs.tarball_hash }}

      - name: 📤 Upload attestations as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary_attestations
          if-no-files-found: error
          path: |
            ${{ steps.attest_toolshed.outputs.bundle-path }}
            ${{ steps.attest_bg_charm_service.outputs.bundle-path }}
            ${{ steps.attest_cf.outputs.bundle-path }}
            ${{ steps.attest_tarball.outputs.bundle-path }}

      - name: 🔍 Verify binary attestations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Verify tarball attestation
          echo "::group::Tarball attestation details"
          gh attestation verify release/labs-${{ github.sha }}.tar.gz -R ${{ github.repository }} --format json | jq
          echo "::endgroup::"
          if [ $? -eq 0 ]; then
            echo -e "\033[32m✓ Tarball attestation verified successfully\033[0m"
          else
            echo -e "\033[31m✗ Tarball attestation verification failed\033[0m"
            exit 1
          fi

          # Verify toolshed binary attestation
          echo "::group::toolshed attestation details"
          gh attestation verify ./dist/toolshed -R ${{ github.repository }} --format json | jq
          echo "::endgroup::"
          if [ $? -eq 0 ]; then
            echo -e "\033[32m✓ toolshed attestation verified successfully\033[0m"
          else
            echo -e "\033[31m✗ toolshed attestation verification failed\033[0m"
            exit 1
          fi

          # Verify bg-charm-service binary attestation
          echo "::group::bg-charm-service attestation details"
          gh attestation verify ./dist/bg-charm-service -R ${{ github.repository }} --format json | jq
          echo "::endgroup::"
          if [ $? -eq 0 ]; then
            echo -e "\033[32m✓ bg-charm-service attestation verified successfully\033[0m"
          else
            echo -e "\033[31m✗ bg-charm-service attestation verification failed\033[0m"
            exit 1
          fi

          # Verify cf binary attestation
          echo "::group::cf attestation details"
          gh attestation verify ./dist/cf -R ${{ github.repository }} --format json | jq
          echo "::endgroup::"
          if [ $? -eq 0 ]; then
            echo -e "\033[32m✓ cf attestation verified successfully\033[0m"
          else
            echo -e "\033[31m✗ cf attestation verification failed\033[0m"
            exit 1
          fi

      - name: 🔑 Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ⚙️ Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: 🚀 Upload artifacts to Google Cloud Storage
        run: |
          gsutil cp release/labs-${{ github.sha }}.tar.gz gs://commontools-build-artifacts/workspace-artifacts/
          gsutil cp release/labs-${{ github.sha }}.hash.txt gs://commontools-build-artifacts/workspace-artifacts/

          # Print clickable links to the uploaded files
          echo "::group::📦 Artifact Links"
          echo "Tarball URL: https://storage.cloud.google.com/commontools-build-artifacts/workspace-artifacts/labs-${{ github.sha }}.tar.gz"
          echo "Hash URL: https://storage.cloud.google.com/commontools-build-artifacts/workspace-artifacts/labs-${{ github.sha }}.hash.txt"
          echo "::endgroup::"

  # Automatic deployment to staging (toolshed)
  deploy-toolshed:
    name: "Deploy to Toolshed (Staging)"
    if: github.ref == 'refs/heads/main'
    needs: ["attest-binaries"]
    runs-on: ubuntu-latest
    environment: toolshed
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup
        with:
          cache: false

      - name: 🚀 Deploy application to Toolshed (Staging)
        uses: appleboy/ssh-action@1530429296e979861824d74fb800013190b5dee0
        with:
          host: ${{ secrets.BASTION_HOST }}
          username: bastion
          key: ${{ secrets.BASTION_SSH_PRIVATE_KEY }}
          script: /opt/cf/deploy.sh ${{ vars.DEPLOYMENT_ENVIRONMENT }} ${{ github.sha }}

  # Automatic deployment to rapids during toolshed migration
  deploy-rapids:
    name: "Deploy to Rapids (Staging)"
    if: github.ref == 'refs/heads/main'
    needs: ["attest-binaries"]
    runs-on: ubuntu-latest
    environment: toolshed
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup
        with:
          cache: false

      - name: 🚀 Deploy application to Rapids (Staging)
        uses: appleboy/ssh-action@1530429296e979861824d74fb800013190b5dee0
        with:
          host: ${{ secrets.BASTION_HOST }}
          username: bastion
          key: ${{ secrets.BASTION_SSH_PRIVATE_KEY }}
          script: /opt/cf/deploy.sh rapids ${{ github.sha }} --skip-clusterduck

  # Deploy shell static assets to staging GCS bucket
  deploy-shell-staging:
    name: "Deploy Shell to Staging"
    if: github.ref == 'refs/heads/main'
    needs:
      [
        "test",
        "check",
        "pattern-integration-test",
        "pattern-reload-integration-test",
        "pattern-unit-test",
        "package-integration-test",
        "cli-integration-test",
      ]
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🏗️ Build shell with staging API URL
        working-directory: packages/shell
        run: deno task production
        env:
          API_URL: ${{ secrets.CLUSTERDUCK_SHELL_API_URL }}
          COMMIT_SHA: ${{ github.sha }}

      - name: 🔑 Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ⚙️ Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: 📤 Upload shell assets to Staging GCS
        run: |
          # Upload to SHA-specific directory for versioning
          gsutil -m rsync -r packages/shell/dist gs://staging-commontools-dev/builds/${{ github.sha }}/

          # Upload to bucket root as "latest" (-d removes orphaned files)
          gsutil -m rsync -r -d packages/shell/dist gs://staging-commontools-dev/

          echo "📦 Staging Shell deployed"
          echo "https://staging.commontools.dev/"

  # Post-deployment patterns test (runs after deployment, so this will NOT block deployments.)
  # DISABLED: This test is currently disabled
  post-deploy-patterns-test:
    name: "Toolshed Post-Deploy Patterns Test"
    if: false # Disabled - was: github.ref == 'refs/heads/main'
    needs: ["deploy-toolshed"]
    runs-on: ubuntu-latest
    environment: toolshed
    continue-on-error: true # Don't fail the workflow if tests fail
    steps:
      - name: 🧩 Run post-deploy Patterns integration tests against Toolshed (Staging)
        id: run_tests
        continue-on-error: true
        uses: appleboy/ssh-action@1530429296e979861824d74fb800013190b5dee0
        with:
          host: ${{ secrets.BASTION_HOST }}
          username: bastion
          key: ${{ secrets.BASTION_SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            /opt/cf/run-pattern-tests-against-toolshed.sh ${{ github.sha }} \
              https://toolshed.saga-castor.ts.net \
              https://toolshed.saga-castor.ts.net

      - name: 📥 Retrieve test logs on failure
        if: steps.run_tests.outcome == 'failure'
        uses: appleboy/ssh-action@1530429296e979861824d74fb800013190b5dee0
        with:
          host: ${{ secrets.BASTION_HOST }}
          username: bastion
          key: ${{ secrets.BASTION_SSH_PRIVATE_KEY }}
          script: |
            LOG_FILE="/tmp/patterns-test-${{ github.sha }}.log"
            if [ -f "$LOG_FILE" ]; then
              echo "📋 Test failed - showing last 500 lines..."
              echo "========================================="
              tail -n 500 "$LOG_FILE"
              echo "========================================="
              echo "Full logs will be available as artifact"
            else
              echo "⚠️ Log file not found at $LOG_FILE"
            fi

      - name: 📦 Download logs from bastion
        if: always()
        uses: nicklasfrahm/scp-action@main
        with:
          direction: download
          host: ${{ secrets.BASTION_HOST }}
          username: bastion
          key: ${{ secrets.BASTION_SSH_PRIVATE_KEY }}
          insecure_ignore_fingerprint: true
          source: /tmp/patterns-test-${{ github.sha }}.log
          target: patterns-test-${{ github.sha }}.log

      - name: 📤 Upload test logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patterns-test-logs-${{ github.sha }}
          path: patterns-test-${{ github.sha }}.log
          retention-days: 7
          if-no-files-found: warn

      - name: 📊 Report test status
        if: always()
        run: |
          if [ "${{ steps.run_tests.outcome }}" == "success" ]; then
            echo "✅ Pattern integration tests PASSED"
          else
            echo "❌ Pattern integration tests FAILED"
            echo "📥 Check the artifacts tab for full logs"
          fi
          exit ${{ steps.run_tests.outcome == 'success' && '0' || '1' }}
