name: Deno Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Every step name must begin with a phase-marker emoji (setup / work / shutdown).
# scripts/ci-gantt.ts reads that emoji to split each job bar by phase. See the
# "Step phase markers" table in docs/development/CI_PERFORMANCE.md for the
# vocabulary and which emoji belongs to which phase.
jobs:
  # ---------------------------------------------------------------------------
  # Tier 0 – These jobs all start immediately with no dependencies
  # ---------------------------------------------------------------------------
  check:
    name: "Check"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        uses: ./.github/actions/deno-install

      - name: 🔎 Check codebase formatting
        run: deno fmt --check

      - name: 🧹 Lint codebase
        run: deno lint

      # This is the only type check for the paths listed in tasks/check.sh:
      # the test jobs in this workflow and the package test tasks run with
      # --no-check and rely on it. Removing a path from check.sh removes its
      # type checking entirely.
      - name: 🔎 Type check codebase
        run: deno task check

      - name: 🧭 Check skill facts
        run: deno task check-skill-facts

      - name: 📄 Type-check docs code blocks
        run: deno task check-docs

      - name: 🚧 Guard against new polling waitFor in integration tests
        run: deno task check-no-waitfor

      - name: 🔎 Check for unused import map dependencies
        run: deno task check-unused-deps

      - name: 🔎 Check Deno toolchain pins are aligned
        run: deno task check-deno-pins

      - name: 🔎 Check single-copy packages resolve once
        run: deno task check-single-copy-deps

      - name: 🔎 Check generated commonfabric/cfc types are up to date
        working-directory: packages/static
        run: deno task check-cfc-types

      - name: 🔎 Check type libraries declare no withheld globals
        working-directory: packages/static
        run: deno task check-withheld-globals

  cfcheck:
    name: "CFC Pattern Check (${{ matrix.shard }}/${{ matrix.total }})"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        total: [4]
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        uses: ./.github/actions/deno-install

      - name: 🔎 Check Common Fabric patterns
        env:
          CFCHECK_SHARD: "${{ matrix.shard }}/${{ matrix.total }}"
        run: deno task cfcheck

  test:
    name: "Test (${{ matrix.shard }}/${{ matrix.total }})"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6]
        total: [6]
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        uses: ./.github/actions/deno-install

      - name: 📦 Install Linux FUSE test dependencies
        uses: ./.github/actions/apt-install
        with:
          packages: pkg-config gcc libfuse3-dev fuse3
          cache-key: cfc-pattern-check

      # For deno-web-test browser tests
      # https://github.com/lino-levan/astral/blob/f5ef833b2c5bde3783564a6b925073d5d46bb4b8/README.md#no-usable-sandbox-with-user-namespace-cloning-enabled
      - name: 🛡️ Disable AppArmor restriction for browser tests
        shell: bash
        run: |
          sysctl_path=/proc/sys/kernel/apparmor_restrict_unprivileged_userns
          if [[ -e "$sysctl_path" ]]; then
            printf '0\n' | sudo tee "$sysctl_path" >/dev/null
          else
            echo "AppArmor unprivileged-userns sysctl is unavailable; no change required."
          fi

      - name: 🧪 Run parallel workspace tests
        run: deno task test
        env:
          DENO_COVERAGE_DIR: coverage/raw/workspace-${{ matrix.shard }}
          TEST_DISABLED_PACKAGES: runner
          TEST_SHARD: "${{ matrix.shard }}/${{ matrix.total }}"

      - name: 🧾 Write coverage report
        if: always()
        run: deno run --allow-read --allow-write --allow-run tasks/write-coverage-lcov.ts coverage/raw/workspace-${{ matrix.shard }} coverage/lcov/workspace-${{ matrix.shard }}.lcov

      - name: 📤 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-profile-workspace-${{ matrix.shard }}
          path: coverage/lcov/workspace-${{ matrix.shard }}.lcov
          retention-days: 90
          if-no-files-found: error

  runner-test:
    name: "Runner Tests (${{ matrix.shard }}/${{ matrix.total }})"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5]
        total: [5]
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        uses: ./.github/actions/deno-install

      - name: 📥 Download Deno dependency binaries
        run: deno task initialize-db

      - name: 🧪 Run runner tests
        working-directory: packages/runner
        env:
          DENO_COVERAGE_DIR: ../../coverage/raw/runner-${{ matrix.shard }}
        run: |
          TEST_FILES=$(deno run --allow-read ../../tasks/select-runner-test-files.ts ${{ matrix.shard }}/${{ matrix.total }})
          if [ -z "$TEST_FILES" ]; then
            echo "::error::No runner test files selected for shard ${{ matrix.shard }}/${{ matrix.total }}"
            exit 1
          fi
          printf 'Runner test shard ${{ matrix.shard }}/${{ matrix.total }} files:\n'
          printf '  %s\n' $TEST_FILES
          # --no-check: the Check job type-checks packages/runner
          # (tasks/check.sh).
          ENV=test deno test \
            --no-check \
            --allow-ffi \
            --allow-env \
            --allow-read \
            --allow-write=/tmp,/var/folders \
            --allow-run=git \
            $TEST_FILES

      - name: 🧾 Write coverage report
        if: always()
        run: deno run --allow-read --allow-write --allow-run tasks/write-coverage-lcov.ts coverage/raw/runner-${{ matrix.shard }} coverage/lcov/runner-${{ matrix.shard }}.lcov

      - name: 📤 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-profile-runner-${{ matrix.shard }}
          path: coverage/lcov/runner-${{ matrix.shard }}.lcov
          retention-days: 90
          if-no-files-found: error

  build-toolshed:
    name: "Build Binary (toolshed)"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        uses: ./.github/actions/deno-install

      - name: 🏗️ Build toolshed binary
        run: deno task build-binaries toolshed
        env:
          COMMIT_SHA: ${{ github.sha }}

      - name: 📤 Upload toolshed binary
        uses: actions/upload-artifact@v7
        with:
          name: binary-toolshed
          path: ./dist/toolshed
          if-no-files-found: error

  build-bg-piece-service:
    name: "Build Binary (bg-piece-service)"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        uses: ./.github/actions/deno-install

      - name: 🏗️ Build bg-piece-service binary
        run: deno task build-binaries bg-piece-service

      - name: 📤 Upload bg-piece-service binary
        uses: actions/upload-artifact@v7
        with:
          name: binary-bg-piece-service
          path: ./dist/bg-piece-service
          if-no-files-found: error

  build-cf:
    name: "Build Binary (cf)"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        uses: ./.github/actions/deno-install

      - name: 🏗️ Build cf binary
        run: deno task build-binaries cf

      - name: 📤 Upload cf binary
        uses: actions/upload-artifact@v7
        with:
          name: binary-cf
          path: ./dist/cf
          if-no-files-found: error

  generated-patterns-integration-test:
    name: "Generated Patterns Integration Tests (${{ matrix.shard }}/${{ matrix.total }})"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        total: [4]
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        uses: ./.github/actions/deno-install

      - name: ♻️ Restore/save generated pattern compile byte cache
        id: compile-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.compile-cache/generated-patterns-${{ matrix.shard }}.json
          key: cc-generated-patterns-${{ hashFiles('packages/ts-transformers/**', 'packages/js-compiler/**', 'packages/runner/src/harness/**', 'packages/runner/src/pattern-coverage.ts', 'packages/runner/src/sandbox/**', 'packages/schema-generator/**', 'packages/api/**', 'packages/static/assets/types/**', 'deno.jsonc', 'deno.lock') }}-${{ matrix.shard }}-${{ hashFiles('packages/generated-patterns/**/*.ts') }}
          restore-keys: |
            cc-generated-patterns-${{ hashFiles('packages/ts-transformers/**', 'packages/js-compiler/**', 'packages/runner/src/harness/**', 'packages/runner/src/pattern-coverage.ts', 'packages/runner/src/sandbox/**', 'packages/schema-generator/**', 'packages/api/**', 'packages/static/assets/types/**', 'deno.jsonc', 'deno.lock') }}-${{ matrix.shard }}-

      - name: 🧾 Record compile cache state for the Performance Check
        uses: ./.github/actions/record-compile-cache-state
        with:
          family: generated-patterns
          shard: ${{ matrix.shard }}
          cache-file: ${{ github.workspace }}/.compile-cache/generated-patterns-${{ matrix.shard }}.json
          exact-hit: ${{ steps.compile-cache.outputs.cache-hit }}

      - name: 📥 Download Deno dependency binaries
        run: deno task initialize-db

      - name: 🧪 Run generated patterns integration tests
        working-directory: packages/generated-patterns
        env:
          CF_COMPILE_CACHE_FILE: ${{ github.workspace }}/.compile-cache/generated-patterns-${{ matrix.shard }}.json
          DENO_COVERAGE_DIR: ../../coverage/raw/generated-patterns-${{ matrix.shard }}
        run: |
          TEST_FILES=$(deno run --allow-read ../../tasks/select-generated-pattern-files.ts ${{ matrix.shard }}/${{ matrix.total }})
          if [ -z "$TEST_FILES" ]; then
            echo "::error::No generated pattern files selected for shard ${{ matrix.shard }}/${{ matrix.total }}"
            exit 1
          fi
          printf 'Generated patterns shard ${{ matrix.shard }}/${{ matrix.total }} files:\n'
          printf '  %s\n' $TEST_FILES
          mkdir -p ../../test-results
          LOG_LEVEL=warn deno test --trace-leaks -A --parallel \
            --junit-path=../../test-results/generated-patterns-${{ matrix.shard }}.xml \
            $TEST_FILES

      - name: 🧾 Write coverage report
        if: always()
        run: deno run --allow-read --allow-write --allow-run tasks/write-coverage-lcov.ts coverage/raw/generated-patterns-${{ matrix.shard }} coverage/lcov/generated-patterns-${{ matrix.shard }}.lcov

      - name: 📤 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-profile-generated-patterns-${{ matrix.shard }}
          path: coverage/lcov/generated-patterns-${{ matrix.shard }}.lcov
          retention-days: 90
          if-no-files-found: error

      - name: 📤 Upload test timing data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-timing-generated-patterns-${{ matrix.shard }}
          path: test-results/
          retention-days: 90
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Tier 1 – Need built binaries
  # ---------------------------------------------------------------------------

  package-integration-test:
    name: "Package Integration Tests (${{ matrix.suite_name }})"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    needs: ["build-toolshed"]
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite_name: runner
            package_dir: packages/runner
            junit_name: runner
            step_name: runner integration tests
            headless: false
          - suite_name: runtime-client
            package_dir: packages/runtime-client
            junit_name: runtime-client
            step_name: runtime-client integration tests
            headless: false
          - suite_name: shell
            package_dir: packages/shell
            junit_name: shell
            step_name: shell integration tests
            headless: true
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        uses: ./.github/actions/deno-install

      - name: 📥 Download toolshed binary
        uses: actions/download-artifact@v8
        with:
          name: binary-toolshed
          path: common-binaries

      - name: 🔌 Start Toolshed server for testing
        env:
          TOOLSHED_PORT: 8000
        run: |
          chmod +x ./common-binaries/toolshed
          CFTS_AI_GATEWAY_URL="" \
          CFTS_AI_LLM_ANTHROPIC_API_KEY=fake \
          ./common-binaries/toolshed --port="$TOOLSHED_PORT" &

      # For Astral
      # https://github.com/lino-levan/astral/blob/f5ef833b2c5bde3783564a6b925073d5d46bb4b8/README.md#no-usable-sandbox-with-user-namespace-cloning-enabled
      - name: 🛡️ Disable AppArmor restriction for browser tests
        shell: bash
        run: |
          sysctl_path=/proc/sys/kernel/apparmor_restrict_unprivileged_userns
          if [[ -e "$sysctl_path" ]]; then
            printf '0\n' | sudo tee "$sysctl_path" >/dev/null
          else
            echo "AppArmor unprivileged-userns sysctl is unavailable; no change required."
          fi

      - name: 🧪 Run ${{ matrix.step_name }}
        working-directory: ${{ matrix.package_dir }}
        env:
          DENO_COVERAGE_DIR: ../../coverage/raw/package-${{ matrix.suite_name }}
          HEADLESS_ENABLED: ${{ matrix.headless }}
          JUNIT_NAME: ${{ matrix.junit_name }}
          TOOLSHED_PORT: 8000
        run: |
          mkdir -p ../../test-results
          if [ "$HEADLESS_ENABLED" = "true" ]; then
            export HEADLESS=1
          fi
          API_URL="http://localhost:${TOOLSHED_PORT}/" \
          INTEGRATION_TEST_FLAGS="--junit-path=../../test-results/${JUNIT_NAME}.xml" \
          deno task integration

      - name: 🧾 Write coverage report
        if: always()
        run: deno run --allow-read --allow-write --allow-run tasks/write-coverage-lcov.ts coverage/raw/package-${{ matrix.suite_name }} coverage/lcov/package-${{ matrix.suite_name }}.lcov

      - name: 📤 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-profile-package-${{ matrix.suite_name }}
          path: coverage/lcov/package-${{ matrix.suite_name }}.lcov
          retention-days: 90
          if-no-files-found: error

      - name: 📤 Upload test timing data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-timing-package-integration-${{ matrix.suite_name }}
          path: test-results/${{ matrix.junit_name }}.xml
          retention-days: 90
          if-no-files-found: ignore

  cli-integration-test:
    name: "CLI Integration Tests (${{ matrix.suite_name }})"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: ${{ matrix.timeout_minutes }}
    needs: ["build-toolshed", "build-cf"]
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite_name: core-piece-values
            script: integration.sh
            section: piece-values
            toolshed_port: 8000
            install_fuse_deps: false
            timeout_minutes: 10
          - suite_name: core-piece-links
            script: integration.sh
            section: piece-links
            toolshed_port: 8001
            install_fuse_deps: false
            timeout_minutes: 10
          - suite_name: core-piece-call
            script: integration.sh
            section: piece-call
            toolshed_port: 8002
            install_fuse_deps: false
            timeout_minutes: 10
          - suite_name: fuse
            script: fuse-exec.sh
            section: ""
            toolshed_port: 8003
            install_fuse_deps: true
            timeout_minutes: 15
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        uses: ./.github/actions/deno-install

      - name: 📥 Download toolshed binary
        uses: actions/download-artifact@v8
        with:
          name: binary-toolshed
          path: common-binaries

      - name: 📥 Download cf binary
        uses: actions/download-artifact@v8
        with:
          name: binary-cf
          path: common-binaries

      - name: 🔌 Start Toolshed server for testing
        env:
          TOOLSHED_PORT: ${{ matrix.toolshed_port }}
          TOOLSHED_URL: http://localhost:${{ matrix.toolshed_port }}
        run: |
          chmod +x ./common-binaries/cf
          chmod +x ./common-binaries/toolshed
          # Set tools to path
          # Integration script needs `cf`
          echo "${{ github.workspace }}/common-binaries" >> $GITHUB_PATH
          CFTS_AI_GATEWAY_URL="" MEMORY_URL="$TOOLSHED_URL" API_URL="$TOOLSHED_URL" ./common-binaries/toolshed --port="$TOOLSHED_PORT" &

      - name: ⏳ Wait for Toolshed to be ready
        uses: ./.github/actions/wait-for-toolshed
        with:
          url: http://localhost:${{ matrix.toolshed_port }}

      - name: 📦 Install CLI integration dependencies
        uses: ./.github/actions/apt-install
        with:
          packages: ${{ matrix.install_fuse_deps && 'jq fuse3 libfuse3-dev' || 'jq' }}
          cache-key: cli-integration

      - name: 🔧 Enable FUSE device access
        if: ${{ matrix.suite_name == 'fuse' }}
        run: sudo chmod 666 /dev/fuse

      - name: 🧪 Run CLI integration suite
        if: ${{ startsWith(matrix.suite_name, 'core-') }}
        working-directory: packages/cli
        env:
          TOOLSHED_PORT: ${{ matrix.toolshed_port }}
          CF_CLI_INTEGRATION_SECTION: ${{ matrix.section }}
          CF_CLI_INTEGRATION_TIMINGS: "1"
          CF_CLI_INTEGRATION_TIMINGS_FILE: "../../test-results/cli-${{ matrix.suite_name }}-cf-timings.log"
        run: |
          mkdir -p ../../test-results
          : > "$CF_CLI_INTEGRATION_TIMINGS_FILE"
          API_URL="http://localhost:${TOOLSHED_PORT}" ./integration/${{ matrix.script }}

      # Deno-based integration tests against the same toolshed. Type checking
      # of the CLI package is done by `deno task check`, so this run skips it.
      # The prebuilt `cf` binary is on PATH, so the tests exercise it rather
      # than the source-tree CLI task.
      - name: 🧪 Run CLI deno integration tests
        if: ${{ matrix.suite_name == 'core-piece-values' }}
        working-directory: packages/cli
        env:
          TOOLSHED_PORT: ${{ matrix.toolshed_port }}
        run: |
          API_URL="http://localhost:${TOOLSHED_PORT}" deno test --no-check \
            --allow-net --allow-ffi --allow-read --allow-write --allow-env \
            --allow-run test/piece-integration.test.ts

      - name: 🧪 Run CLI FUSE integration suite
        if: ${{ matrix.suite_name == 'fuse' }}
        working-directory: packages/cli
        env:
          TOOLSHED_PORT: ${{ matrix.toolshed_port }}
          FUSE_DEEP_ENTITY_PROBE: "0"
          # Single source for the outer step bound: 'timeout' enforces it, and the
          # script's waits give up a few minutes before it (see
          # FUSE_EXEC_OVERALL_TIMEOUT_SECONDS in integration/fuse-exec.sh) so a
          # wedge is reported with diagnostics rather than truncated at cancel.
          FUSE_STEP_TIMEOUT_SECONDS: "480"
        run: |
          set +e
          API_URL="http://localhost:${TOOLSHED_PORT}" \
            FUSE_EXEC_OVERALL_TIMEOUT_SECONDS="${FUSE_STEP_TIMEOUT_SECONDS}" \
            timeout "${FUSE_STEP_TIMEOUT_SECONDS}" ./integration/${{ matrix.script }}
          rc=$?
          set -e
          if [ "$rc" -eq 124 ]; then
            echo "::error::FUSE integration timed out after ${FUSE_STEP_TIMEOUT_SECONDS} seconds"
          fi
          exit "$rc"

      - name: 📋 FUSE daemon log (on failure)
        if: ${{ failure() && matrix.suite_name == 'fuse' }}
        # `cf fuse mount --background` writes its log to /tmp/cf-fuse-<mountpoint>.log
        # (see packages/cli/commands/fuse.ts), not ~/.cf/fuse — the old path always
        # printed "No daemon log found", hiding the real daemon error. The mountpoint
        # is an mktemp dir, so glob all fuse daemon logs.
        run: |
          shopt -s nullglob
          logs=(/tmp/cf-fuse-*.log)
          if [ ${#logs[@]} -eq 0 ]; then
            echo "No FUSE daemon log found at /tmp/cf-fuse-*.log"
          else
            for f in "${logs[@]}"; do
              echo "===== ${f} ====="
              cat "${f}"
            done
          fi

      - name: 📤 Upload CLI integration timing data
        if: ${{ always() && startsWith(matrix.suite_name, 'core-') }}
        uses: actions/upload-artifact@v7
        with:
          name: test-timing-cli-${{ matrix.suite_name }}
          path: test-results/cli-${{ matrix.suite_name }}-cf-timings.log
          retention-days: 90
          if-no-files-found: ignore

  pattern-integration-test:
    name: "Pattern Integration Tests (${{ matrix.shard }}/${{ matrix.total }})"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    needs: ["build-toolshed"]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        total: [4]
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        uses: ./.github/actions/deno-install

      # Cross-run compile cache: persist the per-shard compiled-module-byte cache
      # so unchanged patterns reuse last run's emitted bytes (skip the
      # type-check + transform + emit). The key folds in a hash of everything
      # that shapes emitted bytes or cached coverage spans — the js-compiler,
      # the CF transformer, the schema-generator it bakes schemas from, runner
      # code that prepares and verifies compiled module records, static type
      # assets loaded by the in-memory compiler, the api types lowered into
      # schemas, the root deno.jsonc compiler options (jsx/jsxImportSource), and
      # the lockfile — so any change to what emits or trusts the bytes
      # invalidates the whole file even when it leaves module identity and the
      # runtime-version tag untouched.
      # This input list mirrors COMPILE_FINGERPRINT_INPUTS in
      # packages/runner/src/compilation-cache/compiler-fingerprint.deno.ts, which
      # fingerprints the same set for the durable runtime cache; the
      # compiler-fingerprint test fails if the two drift. The pattern-source and
      # integration-harness hash rolls the key while `restore-keys` still seeds
      # from the most recent prior cache. Hash both TypeScript extensions. An
      # exact actions/cache entry is immutable; newly compiled bytes are saved
      # under a rotated key.
      - name: ♻️ Restore/save compile byte cache
        id: compile-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.compile-cache/pattern-integration-${{ matrix.shard }}.json
          key: cc-${{ hashFiles('packages/ts-transformers/**', 'packages/js-compiler/**', 'packages/runner/src/harness/**', 'packages/runner/src/pattern-coverage.ts', 'packages/runner/src/sandbox/**', 'packages/schema-generator/**', 'packages/api/**', 'packages/static/assets/types/**', 'deno.jsonc', 'deno.lock') }}-${{ matrix.shard }}-${{ hashFiles('packages/patterns/**/*.ts', 'packages/patterns/**/*.tsx') }}
          restore-keys: |
            cc-${{ hashFiles('packages/ts-transformers/**', 'packages/js-compiler/**', 'packages/runner/src/harness/**', 'packages/runner/src/pattern-coverage.ts', 'packages/runner/src/sandbox/**', 'packages/schema-generator/**', 'packages/api/**', 'packages/static/assets/types/**', 'deno.jsonc', 'deno.lock') }}-${{ matrix.shard }}-

      - name: 🧾 Record compile cache state for the Performance Check
        uses: ./.github/actions/record-compile-cache-state
        with:
          family: pattern-integration
          shard: ${{ matrix.shard }}
          cache-file: ${{ github.workspace }}/.compile-cache/pattern-integration-${{ matrix.shard }}.json
          exact-hit: ${{ steps.compile-cache.outputs.cache-hit }}

      - name: 📥 Download toolshed binary
        uses: actions/download-artifact@v8
        with:
          name: binary-toolshed
          path: common-binaries

      - name: 🔌 Start Toolshed server for testing
        run: |
          chmod +x ./common-binaries/toolshed
          CFTS_AI_GATEWAY_URL="" \
          CFTS_AI_LLM_ANTHROPIC_API_KEY=fake \
          ./common-binaries/toolshed &

      - name: ⏳ Wait for Toolshed to be ready
        uses: ./.github/actions/wait-for-toolshed
        with:
          url: http://localhost:8000

      # For Astral
      # https://github.com/lino-levan/astral/blob/f5ef833b2c5bde3783564a6b925073d5d46bb4b8/README.md#no-usable-sandbox-with-user-namespace-cloning-enabled
      - name: 🛡️ Disable AppArmor restriction for browser tests
        shell: bash
        run: |
          sysctl_path=/proc/sys/kernel/apparmor_restrict_unprivileged_userns
          if [[ -e "$sysctl_path" ]]; then
            printf '0\n' | sudo tee "$sysctl_path" >/dev/null
          else
            echo "AppArmor unprivileged-userns sysctl is unavailable; no change required."
          fi

      # Both kinds of coverage: V8 runtime coverage via DENO_COVERAGE_DIR, and
      # authored-pattern coverage via CF_PATTERN_COVERAGE_DIR, which the shell
      # integration harness reads to turn on the browser worker's collector and
      # to place the LCOV it pulls back at teardown. Absolute, because the
      # harness resolves it against a working directory that differs between the
      # two integration jobs. See docs/development/COVERAGE.md.
      - name: 🧩 Run end-to-end patterns integration tests
        working-directory: packages/patterns
        run: |
          mapfile -t TEST_FILES < <(deno run --allow-read ../../tasks/select-pattern-integration-files.ts ${{ matrix.shard }}/${{ matrix.total }})
          printf 'Pattern integration shard ${{ matrix.shard }}/${{ matrix.total }} files:\n'
          printf '  %s\n' "${TEST_FILES[@]}"
          mkdir -p ../../test-results
          # --no-check: the Check job type-checks packages/patterns/integration
          # (tasks/check.sh).
          HEADLESS=1 \
          API_URL=http://localhost:8000/ \
          PATTERN_INTEGRATION_SHARD="${{ matrix.shard }}/${{ matrix.total }}" \
          CF_COMPILE_CACHE_FILE="${{ github.workspace }}/.compile-cache/pattern-integration-${{ matrix.shard }}.json" \
          CF_PATTERN_COVERAGE_DIR="${{ github.workspace }}/coverage/lcov/pattern-runtime/pattern-integration-${{ matrix.shard }}" \
          DENO_COVERAGE_DIR=../../coverage/raw/pattern-integration-${{ matrix.shard }} \
          deno test --no-check --v8-flags=--max-old-space-size=4096 --trace-leaks -A \
            --junit-path=../../test-results/patterns-${{ matrix.shard }}.xml \
            "${TEST_FILES[@]}"

      - name: 🧾 Write coverage report
        if: always()
        run: deno run --allow-read --allow-write --allow-run tasks/write-coverage-lcov.ts coverage/raw/pattern-integration-${{ matrix.shard }} coverage/lcov/pattern-integration-${{ matrix.shard }}.lcov

      # The whole directory: the V8 report plus the authored-pattern LCOV the
      # harness wrote under pattern-runtime/. perf-check joins every .lcov in
      # the artifact, so both streams reach the gate.
      - name: 📤 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-profile-pattern-integration-${{ matrix.shard }}
          path: coverage/lcov/
          retention-days: 90
          if-no-files-found: error

      - name: 📤 Upload test timing data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-timing-pattern-integration-${{ matrix.shard }}
          path: test-results/
          retention-days: 90
          if-no-files-found: ignore

  pattern-reload-integration-test:
    name: "Pattern Reload Integration Tests"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        uses: ./.github/actions/deno-install

      # For Astral
      # https://github.com/lino-levan/astral/blob/f5ef833b2c5bde3783564a6b925073d5d46bb4b8/README.md#no-usable-sandbox-with-user-namespace-cloning-enabled
      - name: 🛡️ Disable AppArmor restriction for browser tests
        shell: bash
        run: |
          sysctl_path=/proc/sys/kernel/apparmor_restrict_unprivileged_userns
          if [[ -e "$sysctl_path" ]]; then
            printf '0\n' | sudo tee "$sysctl_path" >/dev/null
          else
            echo "AppArmor unprivileged-userns sysctl is unavailable; no change required."
          fi

      # Both kinds of coverage — see the note on pattern-integration-test above.
      - name: 🧩 Run pattern reload integration tests
        run: |
          mkdir -p test-results
          HEADLESS=1 \
          EXPERIMENTAL_PERSISTENT_SCHEDULER_STATE=true \
          CF_EXPECT_PERSISTENT_SCHEDULER_STATE=1 \
          CF_PATTERN_COVERAGE_DIR="${{ github.workspace }}/coverage/lcov/pattern-runtime/pattern-reload" \
          DENO_COVERAGE_DIR=coverage/raw/pattern-reload \
          deno task integration --junit-dir=test-results patterns-reload

      - name: 🧾 Write coverage report
        if: always()
        run: deno run --allow-read --allow-write --allow-run tasks/write-coverage-lcov.ts coverage/raw/pattern-reload coverage/lcov/pattern-reload.lcov

      # The whole directory — see the note on pattern-integration-test above.
      - name: 📤 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-profile-pattern-reload
          path: coverage/lcov/
          retention-days: 90
          if-no-files-found: error

      - name: 📤 Upload test timing data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-timing-pattern-reload-integration
          path: test-results/
          retention-days: 90
          if-no-files-found: ignore

  pattern-unit-test:
    name: "Pattern Unit Tests (${{ matrix.chunk }}/${{ matrix.total }})"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    needs: ["build-cf"]
    strategy:
      matrix:
        chunk: [1, 2, 3, 4, 5]
        total: [5]
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        uses: ./.github/actions/deno-install

      - name: 📥 Download Deno dependency binaries
        run: deno task initialize-db

      - name: ♻️ Restore/save pattern unit compile byte cache
        id: compile-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.compile-cache/pattern-unit-coverage-${{ matrix.chunk }}.json
          key: cc-pattern-unit-coverage-${{ hashFiles('packages/ts-transformers/**', 'packages/js-compiler/**', 'packages/runner/src/harness/**', 'packages/runner/src/pattern-coverage.ts', 'packages/runner/src/sandbox/**', 'packages/schema-generator/**', 'packages/api/**', 'packages/static/assets/types/**', 'deno.jsonc', 'deno.lock') }}-${{ matrix.chunk }}-${{ hashFiles('packages/patterns/**/*.ts', 'packages/patterns/**/*.tsx') }}
          restore-keys: |
            cc-pattern-unit-coverage-${{ hashFiles('packages/ts-transformers/**', 'packages/js-compiler/**', 'packages/runner/src/harness/**', 'packages/runner/src/pattern-coverage.ts', 'packages/runner/src/sandbox/**', 'packages/schema-generator/**', 'packages/api/**', 'packages/static/assets/types/**', 'deno.jsonc', 'deno.lock') }}-${{ matrix.chunk }}-

      - name: 🧾 Record compile cache state for the Performance Check
        uses: ./.github/actions/record-compile-cache-state
        with:
          family: pattern-unit
          shard: ${{ matrix.chunk }}
          cache-file: ${{ github.workspace }}/.compile-cache/pattern-unit-coverage-${{ matrix.chunk }}.json
          exact-hit: ${{ steps.compile-cache.outputs.cache-hit }}

      - name: 📥 Download cf binary
        uses: actions/download-artifact@v8
        with:
          name: binary-cf
          path: common-binaries

      - name: 🧪 Run pattern unit tests
        run: |
          chmod +x ./common-binaries/cf
          mkdir -p test-results .compile-cache coverage/lcov/pattern-runtime/pattern-unit-${{ matrix.chunk }}
          DENO_COVERAGE_DIR=coverage/raw/pattern-unit-${{ matrix.chunk }} \
          CF_PATTERN_COVERAGE_DIR=coverage/lcov/pattern-runtime/pattern-unit-${{ matrix.chunk }} \
          CF_COMPILE_CACHE_FILE="${{ github.workspace }}/.compile-cache/pattern-unit-coverage-${{ matrix.chunk }}.json" \
          CF_BINARY=./common-binaries/cf \
          deno task integration --junit-dir=test-results pattern-tests ${{ matrix.chunk }}/${{ matrix.total }}

      - name: 🧾 Write coverage report
        if: always()
        run: deno run --allow-read --allow-write --allow-run tasks/write-coverage-lcov.ts coverage/raw/pattern-unit-${{ matrix.chunk }} coverage/lcov/pattern-unit-${{ matrix.chunk }}.lcov

      - name: 📤 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-profile-pattern-unit-${{ matrix.chunk }}
          path: coverage/lcov/
          retention-days: 90
          if-no-files-found: error

      - name: 📤 Upload test timing data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-timing-pattern-unit-${{ matrix.chunk }}
          path: test-results/
          retention-days: 90
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Tier 2 – Post-test gates and deployments
  # ---------------------------------------------------------------------------

  perf-check:
    name: "Performance Check"
    if: (github.event_name == 'pull_request') || (github.ref_name == 'main')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    needs:
      - check
      - test
      - build-toolshed
      - build-bg-piece-service
      - build-cf
      - package-integration-test
      - cli-integration-test
      - pattern-integration-test
      - pattern-reload-integration-test
      - pattern-unit-test
      - generated-patterns-integration-test
      - runner-test
    permissions:
      contents: read
      actions: read
      # Read-only: fork PRs get a read-only token here regardless, so the gate
      # only writes the comment to an artifact. The coverage-comment workflow
      # posts it from the base-repo context with a write token.
      pull-requests: read
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        uses: ./.github/actions/deno-install

      - name: 📥 Download coverage reports
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-profile-*
          path: coverage-artifacts
          merge-multiple: false
          skip-decompress: false
          digest-mismatch: error

      - name: 📊 Run performance check
        env:
          COVERAGE_ARTIFACTS_DIR: coverage-artifacts
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: deno run --allow-net --allow-env --allow-read --allow-run --allow-write tasks/perf-check.ts

      - name: 📤 Upload coverage regression comment
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-comment
          path: coverage-comment.json
          retention-days: 7
          if-no-files-found: ignore

      - name: 📤 Upload performance metrics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-metrics
          path: perf-metrics.json
          retention-days: 90
          if-no-files-found: ignore

      - name: 📤 Upload performance metrics backfill
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-metrics-backfill
          path: perf-metrics-backfill.json
          retention-days: 90
          if-no-files-found: ignore

  attest-binaries:
    name: "Attest and Upload Binaries"
    if: github.ref == 'refs/heads/main'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    needs:
      [
        "test",
        "check",
        "build-toolshed",
        "build-bg-piece-service",
        "build-cf",
        "runner-test",
        "pattern-integration-test",
        "pattern-reload-integration-test",
        "pattern-unit-test",
        "package-integration-test",
        "cli-integration-test",
        "generated-patterns-integration-test",
      ]
    environment: ci
    permissions:
      id-token: write
      contents: read
      actions: read
      attestations: write
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7

      - name: 📥 Download toolshed binary
        uses: actions/download-artifact@v8
        with:
          name: binary-toolshed
          path: common-binaries

      - name: 📥 Download bg-piece-service binary
        uses: actions/download-artifact@v8
        with:
          name: binary-bg-piece-service
          path: common-binaries

      - name: 📥 Download cf binary
        uses: actions/download-artifact@v8
        with:
          name: binary-cf
          path: common-binaries

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      # Merge every job's LCOV report into one line-coverage file with
      # repository-relative paths, so IDE users can download a single artifact
      # covering the whole repository. Uploaded to Cloud Storage below alongside
      # the signed binaries. Best-effort: a coverage problem must not block
      # binary attestation or the deploys that depend on it.
      - name: 📥 Download coverage reports
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-profile-*
          path: coverage-artifacts

      - name: 🧬 Combine coverage LCOV
        continue-on-error: true
        run: |
          deno run --allow-read --allow-write tasks/combine-coverage-lcov.ts \
            --input-dir=coverage-artifacts \
            --output=release/labs-${{ github.sha }}.lcov \
            --repo-name=${{ github.event.repository.name }}

      - name: 🔐 Process & sign binaries
        run: |
          mkdir -p release
          mkdir -p signed

          mv ./common-binaries ./dist

          # Process toolshed binary
          echo "Processing binary: toolshed"
          sha256sum ./dist/toolshed > ./dist/toolshed.hash.txt
          TOOLSHED_HASH=$(cat ./dist/toolshed.hash.txt | awk '{print $1}')
          echo "toolshed hash: $TOOLSHED_HASH"
          echo "toolshed_hash=$TOOLSHED_HASH" >> $GITHUB_OUTPUT

          # Sign the toolshed binary
          openssl dgst -sha256 -sign <(echo "${{ secrets.ARTIFACT_SIGNING_KEY }}") -out ./dist/toolshed.sig ./dist/toolshed

          # Copy to signed directory
          cp ./dist/toolshed ./signed/
          cp ./dist/toolshed.sig ./signed/

          # Process bg-piece-service binary
          echo "Processing binary: bg-piece-service"
          sha256sum ./dist/bg-piece-service > ./dist/bg-piece-service.hash.txt
          BG_PIECE_SERVICE_HASH=$(cat ./dist/bg-piece-service.hash.txt | awk '{print $1}')
          echo "bg-piece-service hash: $BG_PIECE_SERVICE_HASH"
          echo "bg_piece_service_hash=$BG_PIECE_SERVICE_HASH" >> $GITHUB_OUTPUT

          # Sign the bg-piece-service binary
          openssl dgst -sha256 -sign <(echo "${{ secrets.ARTIFACT_SIGNING_KEY }}") -out ./dist/bg-piece-service.sig ./dist/bg-piece-service

          # Copy to signed directory
          cp ./dist/bg-piece-service ./signed/
          cp ./dist/bg-piece-service.sig ./signed/

          # Process cf binary
          echo "Processing binary: cf"
          sha256sum ./dist/cf > ./dist/cf.hash.txt
          CF_HASH=$(cat ./dist/cf.hash.txt | awk '{print $1}')
          echo "cf hash: $CF_HASH"
          echo "cf_hash=$CF_HASH" >> $GITHUB_OUTPUT

          # Sign the cf binary
          openssl dgst -sha256 -sign <(echo "${{ secrets.ARTIFACT_SIGNING_KEY }}") -out ./dist/cf.sig ./dist/cf

          # Copy to signed directory
          cp ./dist/cf ./signed/
          cp ./dist/cf.sig ./signed/

          # Create a single tarball with all binaries and signatures
          tar -czf release/labs-${{ github.sha }}.tar.gz -C signed .

          # Generate hash for the tarball
          sha256sum release/labs-${{ github.sha }}.tar.gz > release/labs-${{ github.sha }}.hash.txt
          TARBALL_HASH=$(cat release/labs-${{ github.sha }}.hash.txt | awk '{print $1}')
          echo "Tarball hash: $TARBALL_HASH"
          echo "tarball_hash=$TARBALL_HASH" >> $GITHUB_OUTPUT
        id: binary_processing

      - name: 📝 Generate attestation for toolshed binary
        id: attest_toolshed
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ./dist/toolshed
          subject-digest: sha256:${{ steps.binary_processing.outputs.toolshed_hash }}

      - name: 📝 Generate attestation for bg-piece-service binary
        id: attest_bg_piece_service
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ./dist/bg-piece-service
          subject-digest: sha256:${{ steps.binary_processing.outputs.bg_piece_service_hash }}

      - name: 📝 Generate attestation for cf binary
        id: attest_cf
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ./dist/cf
          subject-digest: sha256:${{ steps.binary_processing.outputs.cf_hash }}

      - name: 📝 Generate attestation for tarball
        id: attest_tarball
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: https://storage.cloud.google.com/commontools-build-artifacts/workspace-artifacts/labs-${{ github.sha }}.tar.gz
          subject-digest: sha256:${{ steps.binary_processing.outputs.tarball_hash }}

      - name: 📤 Upload attestations as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binary_attestations
          if-no-files-found: error
          path: |
            ${{ steps.attest_toolshed.outputs.bundle-path }}
            ${{ steps.attest_bg_piece_service.outputs.bundle-path }}
            ${{ steps.attest_cf.outputs.bundle-path }}
            ${{ steps.attest_tarball.outputs.bundle-path }}

      - name: 🔎 Verify binary attestations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Verify tarball attestation
          echo "::group::Tarball attestation details"
          gh attestation verify release/labs-${{ github.sha }}.tar.gz -R ${{ github.repository }} --format json | jq
          echo "::endgroup::"
          if [ $? -eq 0 ]; then
            echo -e "\033[32m✓ Tarball attestation verified successfully\033[0m"
          else
            echo -e "\033[31m✗ Tarball attestation verification failed\033[0m"
            exit 1
          fi

          # Verify toolshed binary attestation
          echo "::group::toolshed attestation details"
          gh attestation verify ./dist/toolshed -R ${{ github.repository }} --format json | jq
          echo "::endgroup::"
          if [ $? -eq 0 ]; then
            echo -e "\033[32m✓ toolshed attestation verified successfully\033[0m"
          else
            echo -e "\033[31m✗ toolshed attestation verification failed\033[0m"
            exit 1
          fi

          # Verify bg-piece-service binary attestation
          echo "::group::bg-piece-service attestation details"
          gh attestation verify ./dist/bg-piece-service -R ${{ github.repository }} --format json | jq
          echo "::endgroup::"
          if [ $? -eq 0 ]; then
            echo -e "\033[32m✓ bg-piece-service attestation verified successfully\033[0m"
          else
            echo -e "\033[31m✗ bg-piece-service attestation verification failed\033[0m"
            exit 1
          fi

          # Verify cf binary attestation
          echo "::group::cf attestation details"
          gh attestation verify ./dist/cf -R ${{ github.repository }} --format json | jq
          echo "::endgroup::"
          if [ $? -eq 0 ]; then
            echo -e "\033[32m✓ cf attestation verified successfully\033[0m"
          else
            echo -e "\033[31m✗ cf attestation verification failed\033[0m"
            exit 1
          fi

      - name: 🔑 Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ⚙️ Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: 📤 Upload artifacts to Google Cloud Storage
        run: |
          gsutil cp release/labs-${{ github.sha }}.tar.gz gs://commontools-build-artifacts/workspace-artifacts/
          gsutil cp release/labs-${{ github.sha }}.hash.txt gs://commontools-build-artifacts/workspace-artifacts/

          # Print clickable links to the uploaded files
          echo "::group::📦 Artifact Links"
          echo "Tarball URL: https://storage.cloud.google.com/commontools-build-artifacts/workspace-artifacts/labs-${{ github.sha }}.tar.gz"
          echo "Hash URL: https://storage.cloud.google.com/commontools-build-artifacts/workspace-artifacts/labs-${{ github.sha }}.hash.txt"

          # The combined coverage report is best-effort; upload it only if the
          # combine step produced it. To download it for a given commit:
          #   gsutil cp gs://commontools-build-artifacts/workspace-artifacts/labs-<commit-sha>.lcov .
          if [ -f release/labs-${{ github.sha }}.lcov ]; then
            gsutil cp release/labs-${{ github.sha }}.lcov gs://commontools-build-artifacts/workspace-artifacts/
            echo "Coverage LCOV URL: https://storage.cloud.google.com/commontools-build-artifacts/workspace-artifacts/labs-${{ github.sha }}.lcov"
          fi
          echo "::endgroup::"

  # Automatic deployment to staging (toolshed)
  deploy-toolshed:
    name: "Deploy to Toolshed (Staging)"
    if: github.ref == 'refs/heads/main'
    needs: ["attest-binaries"]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: toolshed
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup
        with:
          cache: false

      - name: 🚀 Deploy application to Toolshed (Staging)
        uses: appleboy/ssh-action@1530429296e979861824d74fb800013190b5dee0
        with:
          host: ${{ secrets.BASTION_HOST }}
          username: bastion
          key: ${{ secrets.BASTION_SSH_PRIVATE_KEY }}
          script: /opt/cf/deploy.sh ${{ vars.DEPLOYMENT_ENVIRONMENT }} ${{ github.sha }}

  # Automatic deployment to rapids during toolshed migration
  deploy-rapids:
    name: "Deploy to Rapids (Staging)"
    if: github.ref == 'refs/heads/main'
    needs: ["attest-binaries"]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: toolshed
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup
        with:
          cache: false

      - name: 🚀 Deploy application to Rapids (Staging)
        uses: appleboy/ssh-action@1530429296e979861824d74fb800013190b5dee0
        with:
          host: ${{ secrets.BASTION_HOST }}
          username: bastion
          key: ${{ secrets.BASTION_SSH_PRIVATE_KEY }}
          script: /opt/cf/deploy.sh rapids ${{ github.sha }} --skip-clusterduck

  # Deploy shell static assets to staging GCS bucket
  deploy-shell-staging:
    name: "Deploy Shell to Staging"
    if: github.ref == 'refs/heads/main'
    needs:
      [
        "test",
        "check",
        "pattern-integration-test",
        "pattern-reload-integration-test",
        "pattern-unit-test",
        "package-integration-test",
        "cli-integration-test",
      ]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: ci
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        uses: ./.github/actions/deno-install

      - name: 🏗️ Build shell with staging API URL
        working-directory: packages/shell
        run: deno task production
        env:
          API_URL: ${{ secrets.CLUSTERDUCK_SHELL_API_URL }}
          COMMIT_SHA: ${{ github.sha }}

      - name: 🔑 Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ⚙️ Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: 📤 Upload shell assets to Staging GCS
        run: |
          # Retain the complete immutable module graph for long-lived pages.
          gsutil -m rsync -r packages/shell/dist gs://staging-commontools-dev/builds/${{ github.sha }}/

          # Upload to bucket root as "latest" (-d removes orphaned files)
          gsutil -m rsync -r -d packages/shell/dist gs://staging-commontools-dev/

          echo "📦 Staging Shell deployed"
          echo "https://staging.commontools.dev/"
