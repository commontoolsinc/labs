name: Benchmarks

# Benchmarks feed the trend analysis in tasks/perf-regression.ts, which itself
# runs every four hours, so per-push samples add no resolution beyond a
# four-hourly cadence. Scheduled runs stay on the dedicated runner group so
# results remain comparable across runs; use the manual trigger to measure a
# specific commit.
on:
  schedule:
    - cron: "0 */4 * * *" # Every 4 hours
  workflow_dispatch: {} # Allow manual trigger

jobs:
  benchmarks:
    name: "Run Benchmarks"
    runs-on:
      group: labs
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7

      - name: 🦕 Setup Deno
        uses: ./.github/actions/deno-setup

      - name: 🔍 Verify lock file & install dependencies
        uses: ./.github/actions/deno-install

      - name: 📥 Download Deno dependency binaries
        run: deno task initialize-db

      - name: 🏋️ Run benchmarks
        env:
          CF_LOG_LEVEL: silent
        run: |
          mkdir -p bench-results
          deno bench --json -A packages/runner/test/*.bench.ts \
            packages/utils/src/cache.bench.ts \
            packages/utils/test/deep-equal.bench.ts \
            > bench-results/results.json

      - name: 📤 Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-results
          path: bench-results/
          retention-days: 90
          if-no-files-found: ignore
