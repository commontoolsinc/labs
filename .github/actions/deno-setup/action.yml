name: "Deno Setup"
description: "Setup deno"
inputs:
  cache:
    description: "Load deno dependencies from github cache"
    default: true
  deno-version:
    description: "Deno version to install"
    default: "2.8.1"
runs:
  using: "composite"
  steps:
    # Keep in sync with `./tasks/check.sh` version
    - name: 🦕 Setup Deno ${{ inputs.deno-version }}
      uses: denoland/setup-deno@v2
      with:
        deno-version: ${{ inputs.deno-version }}

    # Cache version: bump to invalidate all caches (e.g., v2 -> v3)
    - name: 📦 Cache Deno dependencies
      if: inputs.cache == 'true'
      uses: actions/cache@v4
      with:
        path: |
          ~/.deno
          ~/.cache/deno
          ~/Library/Caches/deno
        key: deno-deps-v4-${{ runner.os }}-${{ runner.arch }}-${{ inputs.deno-version }}-${{ hashFiles('**/deno.json', '**/deno.lock') }}
        restore-keys: |
          deno-deps-v4-${{ runner.os }}-${{ runner.arch }}-${{ inputs.deno-version }}-
          deno-deps-v4-${{ runner.os }}-${{ runner.arch }}-
